---
services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: "1000:131"  # operator:docker
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_LOGLEVEL: info
    volumes:
      - "/home/operator/navidrome/data:/data"
      - "/mnt/media/audio:/music:ro"
